# Upptime commits machine-generated data (history/, graphs/, api/) and rewrites the
# workflows from .upptimerc.yml — keep linters off those so they don't fight the bot.
exclude: "^(history|graphs|api)/|^\\.github/workflows/"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
