# Hand-maintained Upptime workflow — SHA-pinned, auto-regeneration disabled. Don't run
# `upptime update-template`: it regenerates this file and drops the pins. See README.

name: Summary CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [summary]
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.ref_name }}-upptime
  cancel-in-progress: false
# Writes use the App token, not GITHUB_TOKEN — keep the job token read-only.
permissions:
  contents: read
jobs:
  release:
    name: Generate README
    # Run only from the default branch — never deploy or commit from a feature branch.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint a token for the Upptime GitHub App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Generate README
        uses: upptime/uptime-monitor@940c360e6ee3b3f43b234e56a79e15c76a0c6c2e # v1.42.6
        with:
          command: "readme"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
