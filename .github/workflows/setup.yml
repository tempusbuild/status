# Hand-maintained Upptime workflow — SHA-pinned, auto-regeneration disabled. Don't run
# `upptime update-template`: it regenerates this file and drops the pins. See README.

name: Setup CI
on:
  push:
    branches: [main]
    paths:
      - ".upptimerc.yml"
  repository_dispatch:
    types: [setup]
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.ref_name }}-upptime
  cancel-in-progress: false
# Writes use the App token, not GITHUB_TOKEN — keep the job token read-only.
permissions:
  contents: read
jobs:
  release:
    name: Setup Upptime
    # Run only from the default branch — never deploy or commit from a feature branch.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mint a token for the Upptime GitHub App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Update response time
        uses: upptime/uptime-monitor@176831d39d1e5eb6f52a76894ccf4fad51463d33 # v1.43.0
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
      - name: Update summary in README
        uses: upptime/uptime-monitor@176831d39d1e5eb6f52a76894ccf4fad51463d33 # v1.43.0
        with:
          command: "readme"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
      - name: Generate badges and graphs
        run: |
          node scripts/upptime-graphs.mjs
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add api graphs README.md
          git diff --cached --quiet || git commit -m "chore(status): update api badges and graphs [skip ci] [upptime]"
          git push
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
      - name: Generate site
        uses: upptime/uptime-monitor@176831d39d1e5eb6f52a76894ccf4fad51463d33 # v1.43.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
